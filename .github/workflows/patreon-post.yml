# Generates a Patreon post summarizing release changes.
# Triggered only on published releases (not drafts or pre-releases).
# The generator script uses git history to produce a Markdown post.
name: Generate Patreon Post

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to generate post for'
        required: true
        type: string
        default: 'v2.2.0'
      from-tag:
        description: 'Optional: start tag for cumulative range (defaults to previous tag)'
        required: false
        type: string

jobs:
  generate-patreon-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Resolve tag
        id: resolve-tag
        run: |
          TAG="${{ github.event.release.tag_name || github.event.inputs.tag }}"
          FROM_TAG="${{ github.event.inputs.from-tag || '' }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "from-tag=${FROM_TAG}" >> "$GITHUB_OUTPUT"

      - name: Generate Patreon post
        run: node scripts/generate-patreon-post.mjs ${{ steps.resolve-tag.outputs.tag }} ${{ steps.resolve-tag.outputs.from-tag }}

      # Optional: queue post to Papoa if PAPOA_API_KEY is configured.
      # Step is skipped entirely when the secret is not set.
      - name: Queue post to Papoa
        if: env.PAPOA_API_KEY != ''
        continue-on-error: true
        env:
          PAPOA_API_KEY: ${{ secrets.PAPOA_API_KEY }}
        run: |
          # Update versi ini saat Papoa rilis baru — cek https://github.com/Shynixn/PatreonPostApi/releases
          PAPOA_VERSION="v1.0.7"
          curl -fsSL "https://github.com/Shynixn/PatreonPostApi/releases/download/${PAPOA_VERSION}/papoa-linux-x64" -o /tmp/papoa
          chmod +x /tmp/papoa
          /tmp/papoa post create \
            --title "SkillFinder ${{ steps.resolve-tag.outputs.tag }} — Release Update" \
            --content-file patreon-post.md \
            --content-format text/markdown \
            --output-format text/plain

      - name: Upload Patreon post artifact
        uses: actions/upload-artifact@v4
        with:
          name: patreon-post
          path: patreon-post.md
